<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1ª Viagem Missionária de Paulo - Rotas Separadas</title>

    <!-- Links oficiais da CDN do Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com" />
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { width: 100vw; height: 100vh; background-color: #f4f4f4; }
        .popup-titulo { font-weight: bold; color: #2c3e50; margin-bottom: 5px; font-size: 14px; }
        .popup-desc { font-size: 12px; color: #555; line-height: 1.4; }
        /* Estilização da legenda no mapa */
        .legend {
            background: white;
            padding: 10px;
            line-height: 18px;
            color: #333;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-size: 12px;
        }
        .legend i { width: 18px; height: 12px; float: left; margin-right: 8px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Script oficial do Leaflet -->
    <script src="https://unpkg.com"></script>
    <script>
        // 1. Inicializa o mapa focado na região geral do Mediterrâneo Oriental
        const map = L.map('map').setView([36.5, 34.0], 6);

        // 2. Camada de Satélite estável (Esri World Imagery)
        L.tileLayer('https://arcgisonline.com{z}/{y}/{x}', {
            maxZoom: 18,
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        // Nomes de cidades e fronteiras aplicados por cima do satélite
        L.tileLayer('https://{s}://{z}/{x}/{y}.png', {
            maxZoom: 18
        }).addTo(map);

        // 3. Dados das paradas (Ida)
        const rotaIda = [
            { name: "Antioquia da Síria", coords: [36.2021, 36.1601], desc: "<b>Início da Viagem:</b> Paulo e Barnabé são enviados pela igreja. (Atos 13:1-3)" },
            { name: "Selêucia", coords: [36.1178, 35.9261], desc: "<b>Porto de Partida:</b> Embarque rumo à ilha de Chipre. (Atos 13:4)" },
            { name: "Salamina (Chipre)", coords: [35.1837, 33.9069], desc: "<b>Chegada a Chipre:</b> Anunciaram a palavra nas sinagogas. (Atos 13:5)" },
            { name: "Pafos (Chipre)", coords: [34.7720, 32.4245], desc: "<b>Confronto Espiritual:</b> Paulo repreende o mago Elimas. (Atos 13:6-12)" },
            { name: "Perge da Panfília", coords: [36.9606, 30.8522], desc: "<b>Abandono de João Marcos:</b> Retorno dele para Jerusalém. (Atos 13:13)" },
            { name: "Antioquia da Pisídia", coords: [38.2975, 31.1856], desc: "<b>Grande Discurso:</b> Paulo prega na sinagoga. (Atos 13:14-52)" },
            { name: "Icônio", coords: [37.8714, 32.4847], desc: "<b>Sinais e Prodígios:</b> Pregaram com coragem. (Atos 14:1-7)" },
            { name: "Listra", coords: [37.5761, 32.2033], desc: "<b>Cura e Apedrejamento:</b> Paulo é apedrejado e quase morre. (Atos 14:8-20)" },
            { name: "Derbe", coords: [37.3483, 33.1764], desc: "<b>Fim da Ida:</b> Pregaram o evangelho e fizeram discípulos. (Atos 14:20-21)" }
        ];

        // Dados das paradas (Volta)
        const rotaVolta = [
            { name: "Derbe (Retorno)", coords: [37.3483, 33.1764], desc: "<b>Início do Retorno:</b> Decidem voltar fortalecendo os discípulos. (Atos 14:21)" },
            { name: "Listra (Visita)", coords: [37.5761, 32.2033], desc: "<b>Fortalecimento:</b> Encorajamento dos novos cristãos. (Atos 14:21-22)" },
            { name: "Icônio (Visita)", coords: [37.8714, 32.4847], desc: "<b>Organização:</b> Estabelecimento de presbíteros nas igrejas. (Atos 14:21-23)" },
            { name: "Antioquia da Pisídia (Visita)", coords: [38.2975, 31.1856], desc: "<b>Consolidação:</b> Passagem final pela região da Pisídia. (Atos 14:24)" },
            { name: "Perge (Pregação)", coords: [36.9606, 30.8522], desc: "<b>Pregação da Palavra:</b> Desta vez pregam explicitamente na cidade. (Atos 14:25)" },
            { name: "Atália", coords: [36.8841, 30.7056], desc: "<b>Porto de Retorno:</b> De onde navegaram de volta para a Síria. (Atos 14:25)" },
            { name: "Antioquia da Síria (Fim)", coords: [36.2021, 36.1601], desc: "<b>Fim da Viagem:</b> Relatório à igreja local. (Atos 14:26-28)" }
        ];

        // 4. Mapeamento e criação dos marcadores únicos
        const todasAsParadas = [...rotaIda, ...rotaVolta];
        const marcadoresCriados = {};

        todasAsParadas.forEach(parada => {
            const chaveCoordenada = parada.coords.join(',');
            const conteudoPopup = `<div class="popup-titulo">${parada.name}</div><div class="popup-desc">${parada.desc}</div>`;

            if (!marcadoresCriados[chaveCoordenada]) {
                const novoMarcador = L.marker(parada.coords).addTo(map).bindPopup(conteudoPopup);
                marcadoresCriados[chaveCoordenada] = novoMarcador;
            } else {
                const marcadorExistente = marcadoresCriados[chaveCoordenada];
                const textoAnterior = marcadorExistente.getPopup().getContent();
                marcadorExistente.setPopupContent(`${textoAnterior}<hr style="border: 0; border-top: 1px dashed #ccc; margin: 8px 0;">${conteudoPopup}`);
            }
        });

        // 5. Extração das coordenadas lineares
        const coordsIda = rotaIda.map(p => p.coords);
        const coordsVolta = rotaVolta.map(p => p.coords);

        // 6. Linhas de rota (Ida: Azul / Volta: Laranja)
        const linhaIda = L.polyline(coordsIda, {
            color: '#2980b9',
            weight: 4,
            opacity: 0.9,
            dashArray: '8, 8'
        }).addTo(map);

        const linhaVolta = L.polyline(coordsVolta, {
            color: '#e67e22',
            weight: 4,
            opacity: 0.9,
            dashArray: '4, 6'
        }).addTo(map);

        // 7. Renderização da Legenda
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<b>1ª Viagem de Paulo</b><br>';
            div.innerHTML += '<i style="background: #2980b9"></i> Trajeto de Ida<br>';
            div.innerHTML += '<i style="background: #e67e22"></i> Trajeto de Volta<br>';
            return div;
        };
        legend.addTo(map);

        // 8. Auto-enquadramento automático corrigido e seguro
        const grupoRotas = L.featureGroup([linhaIda, linhaVolta]);
        map.fitBounds(grupoRotas.getBounds(), { padding: [40, 40] });
    </script>
</body>
</html>
